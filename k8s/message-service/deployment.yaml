apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-service
  namespace: agent-orchestrator
  labels:
    app: message-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: message-service
  template:
    metadata:
      labels:
        app: message-service
    spec:
      containers:
        - name: message-service
          image: your-registry/agent-orchestrator/message-service:latest
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: NODE_ENV
              value: production
            - name: API_GATEWAY_URL
              value: http://api-gateway:3000
            - name: DATA_ROOT
              value: /data
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: orchestrator-secrets
                  key: DATABASE_URL
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: orchestrator-secrets
                  key: INTERNAL_SECRET
          volumeMounts:
            - name: agent-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: agent-data
          persistentVolumeClaim:
            claimName: agent-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: message-service
  namespace: agent-orchestrator
spec:
  selector:
    app: message-service
  ports:
    - port: 3002
      targetPort: 3002
  type: ClusterIP
