apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: agent-orchestrator
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
  namespace: agent-orchestrator
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"  # SSE long-lived connections
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
    - host: your-domain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 3000
  tls:
    - hosts:
        - your-domain.com
      secretName: tls-secret
