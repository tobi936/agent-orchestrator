apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-manager
  namespace: agent-orchestrator
  labels:
    app: agent-manager
spec:
  replicas: 1  # Keep 1 — manages Docker socket (stateful)
  selector:
    matchLabels:
      app: agent-manager
  template:
    metadata:
      labels:
        app: agent-manager
    spec:
      containers:
        - name: agent-manager
          image: your-registry/agent-orchestrator/agent-manager:latest
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: production
            - name: API_GATEWAY_URL
              value: http://api-gateway:3000
            - name: MESSAGE_SERVICE_URL
              value: http://message-service:3002
            - name: AGENT_IMAGE
              value: "agent-orchestrator/agent:latest"
            - name: DOCKER_SOCKET
              value: /var/run/docker.sock
            - name: DATA_ROOT
              value: /data
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: orchestrator-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: orchestrator-secrets
                  key: JWT_SECRET
            - name: INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  name: orchestrator-secrets
                  key: INTERNAL_SECRET
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: orchestrator-secrets
                  key: ANTHROPIC_API_KEY
          volumeMounts:
            - name: docker-socket
              mountPath: /var/run/docker.sock
            - name: agent-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1"
      volumes:
        - name: docker-socket
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        - name: agent-data
          persistentVolumeClaim:
            claimName: agent-data-pvc
