name: DB Push

on:
  workflow_dispatch:

jobs:
  db-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --prefix apps/web
      - run: npx prisma db push --schema=prisma/schema.prisma --skip-generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
