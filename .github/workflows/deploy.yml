name: Deploy to GCE

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -fsS -X POST "${{ secrets.APP_URL }}/api/deploy" \
            -H "x-deploy-secret: ${{ secrets.DEPLOY_SECRET }}" \
            --max-time 15
