app = "agent-orchestrator-runner"
primary_region = "fra"

[build]
  dockerfile = "apps/runner/Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"
  PROVIDER = "ollama"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
